<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <title>Neil AI Hub</title>
    <meta name="description" content="Mission control for an AI learning journey." />
    <meta name="theme-color" content="#0b0e1c" />
    <link rel="manifest" href="./manifest.json" />
    <link rel="icon" type="image/svg+xml" href="./icons/icon.svg" />
    <!-- iOS "Add to Home Screen" doesn't reliably read SVG apple-touch-icon —
         it needs a PNG, which is why the old icon may have looked stale/wrong. -->
    <link rel="apple-touch-icon" href="./icons/icon-192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Neil AI Hub" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="stylesheet" href="./css/styles.css" />
    <script>
      // Visible build stamp (also shown in the sync panel, js/sync.js) — bump
      // together with sw.js's CACHE constant on every deploy. Without this,
      // "the fix didn't work" and "you're looking at a stale cached build"
      // are indistinguishable from a screenshot alone.
      window.__BUILD__ = 'v59';

      // CONFIRMED 2026-07-17 via a color-coded debug build on Neil's actual
      // device (iPhone Pro/Pro Max, Standard zoom): window.innerHeight and
      // visualViewport.height both read 894px, but that device's true
      // logical height is 932px — WebKit under-reports the viewport by
      // ~38pt in standalone mode. This isn't fixable by reading a
      // *different* API: 100vh/100dvh, visualViewport, innerHeight, and
      // even position:fixed;inset:0 on html/body (previously assumed to be
      // "the one primitive WebKit always gets right") all ultimately trace
      // back to the same internal, wrong number on this device. Two rounds
      // of "fixes" here only ever touched which API fed a CSS height, which
      // could never work while the underlying metric itself is wrong.
      //
      // Current fix (css/styles.css, same day): stop trying to know the
      // exact viewport height at all. Normal document flow + .bottom-nav
      // is position:sticky, which rides the browser's live compositor-
      // tracked scroll position instead of a reported (and here, wrong)
      // height value. Do not reintroduce a JS-measured or CSS vh/dvh-based
      // *exact*-height shell without new on-device proof the underlying
      // WebKit metric itself has been fixed.
      //
      // visualViewport/innerHeight are still recorded below in __DIAG__
      // purely as diagnostic numbers (to prove/track this exact
      // discrepancy over time) — they must never again feed a layout-
      // critical CSS value.
      //
      // Safe-area insets (--safe-top/--safe-bottom) are a separate, still-
      // legitimate mechanism: measured with a physical DOM probe
      // (getBoundingClientRect forces a real layout, giving the resolved
      // pixel value) rather than read as a raw env()/CSS-custom-property
      // value — WebKit bug 274773 documents the custom-property bridge
      // returning stale or zero values; WebKit bug 191872 documents env()
      // itself not being set until "some arbitrary time after page load."
      // These measured correctly (34px/62px) on Neil's device, unlike the
      // height value above — recalc'd on the same triggers for safety.
      //
      // Recalc (for safe-area + diagnostics) still runs on
      // visibilitychange/pageshow, not just load/resize — an unresolved iOS
      // 17+ WebKit bug (Apple Developer Forums thread 744327) lets
      // position:fixed shells silently drift after the app sits backgrounded
      // for a while and is reopened, with no resize event ever firing to
      // say so.
      (function () {
        var meta = document.querySelector('meta[name="viewport"]');
        var probe = null;

        function measureSafeArea() {
          if (!document.body) return null;
          if (!probe) {
            probe = document.createElement('div');
            probe.style.cssText = 'position:fixed;top:0;left:0;width:0;visibility:hidden;pointer-events:none;';
            document.body.appendChild(probe);
          }
          probe.style.height = 'env(safe-area-inset-bottom)';
          // getBoundingClientRect forces layout, so this is the browser's
          // actual resolved value right now, not a possibly-stale one.
          var bottom = probe.getBoundingClientRect().height;
          probe.style.height = 'env(safe-area-inset-top)';
          var top = probe.getBoundingClientRect().height;
          document.documentElement.style.setProperty('--safe-bottom', bottom + 'px');
          document.documentElement.style.setProperty('--safe-top', top + 'px');
          return { top: top, bottom: bottom };
        }

        function recordDiag(safe) {
          window.__DIAG__ = {
            ts: new Date().toISOString(),
            standalone: (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches) || window.navigator.standalone === true,
            innerHeight: window.innerHeight,
            innerWidth: window.innerWidth,
            vvHeight: window.visualViewport && Math.round(window.visualViewport.height),
            vvWidth: window.visualViewport && Math.round(window.visualViewport.width),
            safeTop: safe ? Math.round(safe.top) : null,
            safeBottom: safe ? Math.round(safe.bottom) : null,
            dpr: window.devicePixelRatio,
          };
        }

        function forceRecalc() {
          if (meta) {
            var original = meta.getAttribute('content');
            meta.setAttribute('content', original.replace('viewport-fit=cover', 'viewport-fit=auto'));
            requestAnimationFrame(function () {
              meta.setAttribute('content', original);
              recordDiag(measureSafeArea());
            });
          } else {
            recordDiag(measureSafeArea());
          }
        }

        recordDiag(measureSafeArea());
        // Exposed so the sync panel (js/sync.js) can force one fresh
        // measurement the instant it's opened, instead of showing whatever
        // __DIAG__ happened to be from the last trigger.
        window.__recalcDiag__ = forceRecalc;
        window.addEventListener('resize', forceRecalc);
        window.addEventListener('orientationchange', function () { setTimeout(forceRecalc, 250); });
        if (window.visualViewport) window.visualViewport.addEventListener('resize', forceRecalc);
        // Standalone launch can hand over a stale height/env() during the splash phase.
        window.addEventListener('load', function () {
          [150, 500, 1200].forEach(function (ms) { setTimeout(forceRecalc, ms); });
        });
        // The actual trigger for the "backgrounded for a while, reopened,
        // dock has drifted" bug — re-assert on every foreground, not just launch.
        document.addEventListener('visibilitychange', function () {
          if (document.visibilityState === 'visible') forceRecalc();
        });
        window.addEventListener('pageshow', forceRecalc);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>

    <!-- Vendored libraries (no build step). UMD globals: React, ReactDOM, htm -->
    <script src="./vendor/react.production.min.js"></script>
    <script src="./vendor/react-dom.production.min.js"></script>
    <script src="./vendor/htm.umd.js"></script>

    <script type="module" src="./js/main.js"></script>
  </body>
</html>
