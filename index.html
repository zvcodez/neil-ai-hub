<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <title>Neil AI Hub</title>
    <meta name="description" content="Mission control for an AI learning journey." />
    <meta name="theme-color" content="#0b0e1c" />
    <link rel="manifest" href="./manifest.json" />
    <link rel="icon" type="image/svg+xml" href="./icons/icon.svg" />
    <!-- iOS "Add to Home Screen" doesn't reliably read SVG apple-touch-icon —
         it needs a PNG, which is why the old icon may have looked stale/wrong. -->
    <link rel="apple-touch-icon" href="./icons/icon-192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Neil AI Hub" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <div id="root"></div>

    <!-- Vendored libraries (no build step). UMD globals: React, ReactDOM, htm -->
    <script src="./vendor/react.production.min.js"></script>
    <script src="./vendor/react-dom.production.min.js"></script>
    <script src="./vendor/htm.umd.js"></script>

    <script type="module" src="./js/main.js"></script>
  </body>
</html>
