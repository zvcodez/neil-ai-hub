<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <title>Neil AI Hub</title>
    <meta name="description" content="Mission control for an AI learning journey." />
    <meta name="theme-color" content="#0b0e1c" />
    <link rel="manifest" href="./manifest.json" />
    <link rel="icon" type="image/svg+xml" href="./icons/icon.svg" />
    <!-- iOS "Add to Home Screen" doesn't reliably read SVG apple-touch-icon —
         it needs a PNG, which is why the old icon may have looked stale/wrong. -->
    <link rel="apple-touch-icon" href="./icons/icon-192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Neil AI Hub" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="stylesheet" href="./css/styles.css" />
    <script>
      // --app-height: the visualViewport is the one viewport API iOS reports
      // truthfully in standalone mode; publish it as a CSS var so the shell
      // (.app in css/styles.css) can use it as a second line of defense on
      // top of the position:fixed pin — see ~/Claude/dock-issue/PWA-DOCK-BUG.md.
      (function () {
        function setAppHeight() {
          var h = (window.visualViewport && window.visualViewport.height) || window.innerHeight;
          document.documentElement.style.setProperty('--app-height', Math.round(h) + 'px');
        }
        setAppHeight();
        window.addEventListener('resize', setAppHeight);
        window.addEventListener('orientationchange', function () { setTimeout(setAppHeight, 250); });
        if (window.visualViewport) window.visualViewport.addEventListener('resize', setAppHeight);
        // Standalone launch can hand over a stale height during the splash phase.
        window.addEventListener('load', function () {
          [150, 500, 1200].forEach(function (ms) { setTimeout(setAppHeight, ms); });
        });
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>

    <!-- Vendored libraries (no build step). UMD globals: React, ReactDOM, htm -->
    <script src="./vendor/react.production.min.js"></script>
    <script src="./vendor/react-dom.production.min.js"></script>
    <script src="./vendor/htm.umd.js"></script>

    <script type="module" src="./js/main.js"></script>
  </body>
</html>
